---
- name: Deploy and configure RHEL9 CIS VMs on ESXi
  hosts: localhost
  connection: local
  gather_facts: no

  vars:
    vms:
      - graffias.openincite.net
      - acrab.openincite.net
      - jabbah.openincite.net
      - alniyat.openincite.net
      - apollyon.openincite.net
      - shaula.openincite.net
      - lesath.openincite.net

    vmware_hostname: 192.168.1.20
    vmware_username: root
    vmware_password: "{{ vmware_password }}"

    datastore: datastore1
    network_name: "VM Network"

    vm_cpu: 4
    vm_ram_mb: 8192

    base_disk: "[datastore1] RHEL9-CIS_L1/RHEL9-CIS_L1.vmdk"

  tasks:

    - name: Debug VMware connection
      debug:
        msg:
          - "ESXi: {{ vmware_hostname }}"
          - "User: {{ vmware_username }}"

    # ------------------------------------------------------------
    # CREATE VM FROM EXISTING DISK
    # ------------------------------------------------------------
    - name: Create VM and attach existing disk
      community.vmware.vmware_guest:
        hostname: "{{ vmware_hostname }}"
        username: "{{ vmware_username }}"
        password: "{{ vmware_password }}"
        validate_certs: false
        port: 443

        datacenter: ha-datacenter
        folder: "/ha-datacenter/vm"

        name: "{{ item }}"
        state: poweredoff
        guest_id: rhel9_64Guest

        hardware:
          memory_mb: "{{ vm_ram_mb }}"
          num_cpus: "{{ vm_cpu }}"
          scsi: paravirtual

        disk:
          - filename: "{{ base_disk }}"

        networks:
          - name: "{{ network_name }}"
            device_type: vmxnet3

      loop: "{{ vms }}"
      delegate_to: localhost

    # ------------------------------------------------------------
    # POWER ON VMs
    # ------------------------------------------------------------
    - name: Power on VMs
      community.vmware.vmware_guest_powerstate:
        hostname: "{{ vmware_hostname }}"
        username: "{{ vmware_username }}"
        password: "{{ vmware_password }}"
        validate_certs: false
        port: 443

        name: "{{ item }}"
        state: powered-on

      loop: "{{ vms }}"
      delegate_to: localhost
