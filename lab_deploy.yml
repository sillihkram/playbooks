---
- name: Deploy and configure RHEL9 CIS VMs on ESXi
  hosts: localhost
  connection: local
  gather_facts: no

  vars:
    vms:
      - graffias.openincite.net
      - acrab.openincite.net
      - jabbah.openincite.net
      - alniyat.openincite.net
      - apollyon.openincite.net
      - shaula.openincite.net
      - lesath.openincite.net

    datastore: datastore1
    network_name: "VM Network"

    source_vmdk_dir: "RHEL9-CIS_L1"
    source_vmdk_name: "RHEL9-CIS_L1.vmdk"

    vm_cpu: 4
    vm_ram_mb: 8192
    vm_disk_gb: 100

  tasks:

    - name: Debug VMware connection
      debug:
        msg:
          - "Host: {{ vmware_hostname }}"
          - "User: {{ vmware_username }}"

    # ------------------------------------------------------------
    # COPY DISK (NO DIRECTORY CREATION — ESXi handles this)
    # ------------------------------------------------------------
    - name: Copy base VMDK for each VM
      community.vmware.vsphere_copy:
        hostname: "{{ vmware_hostname }}"
        username: "{{ vmware_username }}"
        password: "{{ vmware_password }}"
        validate_certs: false
        port: 443

        datacenter: ha-datacenter
        datastore: "{{ datastore }}"

        src: "{{ source_vmdk_dir }}/{{ source_vmdk_name }}"
        dest: "{{ item }}/{{ item }}.vmdk"

      loop: "{{ vms }}"
      delegate_to: localhost

    # ------------------------------------------------------------
    # CREATE VM
    # ------------------------------------------------------------
    - name: Create VM and attach disk
      community.vmware.vmware_guest:
        hostname: "{{ vmware_hostname }}"
        username: "{{ vmware_username }}"
        password: "{{ vmware_password }}"
        validate_certs: false
        port: 443

        name: "{{ item }}"
        state: poweredoff
        guest_id: rhel9_64Guest

        hardware:
          memory_mb: "{{ vm_ram_mb }}"
          num_cpus: "{{ vm_cpu }}"
          scsi: paravirtual

        disk:
          - filename: "[{{ datastore }}] {{ item }}/{{ item }}.vmdk"

        networks:
          - name: "{{ network_name }}"
            device_type: vmxnet3

      loop: "{{ vms }}"
      delegate_to: localhost

    # ------------------------------------------------------------
    # EXPAND DISK
    # ------------------------------------------------------------
    - name: Ensure disk is 100 GiB
      community.vmware.vmware_guest_disk:
        hostname: "{{ vmware_hostname }}"
        username: "{{ vmware_username }}"
        password: "{{ vmware_password }}"
        validate_certs: false
        port: 443

        name: "{{ item }}"
        disk:
          - unit_number: 0
            size_gb: "{{ vm_disk_gb }}"
            state: present

      loop: "{{ vms }}"
      delegate_to: localhost

    # ------------------------------------------------------------
    # POWER ON
    # ------------------------------------------------------------
    - name: Power on VMs
      community.vmware.vmware_guest_powerstate:
        hostname: "{{ vmware_hostname }}"
        username: "{{ vmware_username }}"
        password: "{{ vmware_password }}"
        validate_certs: false
        port: 443

        name: "{{ item }}"
        state: powered-on

      loop: "{{ vms }}"
      delegate_to: localhost
