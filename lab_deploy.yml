---
- name: Deploy VMs on standalone ESXi using folder copy method
  hosts: localhost
  connection: local
  gather_facts: no

  vars:
    vmware_hostname: 192.168.1.20
    vmware_username: root
    vmware_password: "{{ vmware_password }}"

    datacenter: ha-datacenter
    datastore: datastore1

    base_vm_path: "RHEL9-CIS_L1"

    vms:
      - graffias.openincite.net
      - acrab.openincite.net
      - jabbah.openincite.net
      - alniyat.openincite.net
      - apollyon.openincite.net
      - shaula.openincite.net
      - lesath.openincite.net

  tasks:

    # ------------------------------------------------------------
    # COPY ENTIRE VM DIRECTORY (CRITICAL FIX)
    # ------------------------------------------------------------
    - name: Copy VM folder for each instance
      community.vmware.vsphere_copy:
        hostname: "{{ vmware_hostname }}"
        username: "{{ vmware_username }}"
        password: "{{ vmware_password }}"
        validate_certs: false

        datacenter: "{{ datacenter }}"
        datastore: "{{ datastore }}"

        src: "{{ base_vm_path }}"
        dest: "{{ item }}"

      loop: "{{ vms }}"
      delegate_to: localhost

    # ------------------------------------------------------------
    # REGISTER VMX FILE (THIS IS WHAT WAS MISSING BEFORE)
    # ------------------------------------------------------------
    - name: Register VM from copied VMX
      community.vmware.vmware_guest_register_operation:
        hostname: "{{ vmware_hostname }}"
        username: "{{ vmware_username }}"
        password: "{{ vmware_password }}"
        validate_certs: false

        datacenter: "{{ datacenter }}"

        name: "{{ item }}"
        path: "[{{ datastore }}] {{ item }}/{{ base_vm_path }}.vmx"

      loop: "{{ vms }}"
      delegate_to: localhost

    # ------------------------------------------------------------
    # POWER ON
    # ------------------------------------------------------------
    - name: Power on VMs
      community.vmware.vmware_guest_powerstate:
        hostname: "{{ vmware_hostname }}"
        username: "{{ vmware_username }}"
        password: "{{ vmware_password }}"
        validate_certs: false

        name: "{{ item }}"
        state: powered-on

      loop: "{{ vms }}"
      delegate_to: localhost
