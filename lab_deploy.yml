---
- name: Deploy RHEL9 CIS VMs on standalone ESXi using vmkfstools
  hosts: localhost
  connection: local
  gather_facts: no

  vars:
    esxi_host: 192.168.1.20
    esxi_user: root
    esxi_password: "{{ vmware_password }}"

    datastore: "datastore1"
    base_path: "/vmfs/volumes/datastore1"
    base_vm: "RHEL9-CIS_L1"

    vms:
      - graffias.openincite.net
      - acrab.openincite.net
      - jabbah.openincite.net
      - alniyat.openincite.net
      - apollyon.openincite.net
      - shaula.openincite.net
      - lesath.openincite.net

  tasks:

    # ------------------------------------------------------------
    # 1. CREATE VM FOLDERS
    # ------------------------------------------------------------
    - name: Create VM directories
      ansible.builtin.shell: |
        sshpass -p "{{ esxi_password }}" ssh -o StrictHostKeyChecking=no {{ esxi_user }}@{{ esxi_host }} \
        "mkdir -p {{ base_path }}/{{ item }}"
      loop: "{{ vms }}"

    # ------------------------------------------------------------
    # 2. CLONE DISK USING VMKFSTOOLS (THIN PROVISIONED)
    # ------------------------------------------------------------
    - name: Clone base disk (thin provisioned)
      ansible.builtin.shell: |
        sshpass -p "{{ esxi_password }}" ssh {{ esxi_user }}@{{ esxi_host }} "
        vmkfstools -i \
        {{ base_path }}/{{ base_vm }}/{{ base_vm }}.vmdk \
        {{ base_path }}/{{ item }}/{{ item }}.vmdk \
        -d thin
        "
      loop: "{{ vms }}"

    # ------------------------------------------------------------
    # 3. CREATE VMX FILES
    # ------------------------------------------------------------
    - name: Create VMX configuration
      ansible.builtin.shell: |
        sshpass -p "{{ esxi_password }}" ssh {{ esxi_user }}@{{ esxi_host }} "
        cat > {{ base_path }}/{{ item }}/{{ item }}.vmx <<EOF
        
        # Hardware settings 
        config.version = \"8\"
        virtualHW.version = \"19\"
        vmci0.present = \"TRUE\"
        displayName = \"{{ item }}\"
        guestOS = \"rhel9-64\"
        memsize = \"8192\"
        numvcpus = \"4\"

        # Pci settings
        pciBridge0.present = \"TRUE\"
        pciBridge4.present = \"TRUE\"
        pciBridge4.virtualDev = \"pcieRootPort\"
        pciBridge4.functions = \"8\"

        # Scsi settings
        scsi0.present = \"TRUE\"
        scsi0.virtualDev = \"pvscsi\"
        scsi0.pciSlotNumber = \"160\"
        scsi0:0.present = \"TRUE\"
        scsi0:0.fileName = \"{{ item }}.vmdk\"
        scsi0:0.deviceType = \"scsi-hardDisk\"       

        # Nic Settings (vmxnet3)
        ethernet0.present = \"TRUE\"
        ethernet0.virtualDev = \"vmxnet3\"
        ethernet0.networkName = \"VM Network\"
        ethernet0.startConnected = \"TRUE\"
        ethernet0.addressType = \"generated\"
        
        # Display settings
        svga.present = \"TRUE\"
        svga.vramSize = \"16777216\"
        svga.autodetect = \"TRUE\"

        # Power Settings
        powerType.powerOff = \"soft\"
        
        EOF
        "
      loop: "{{ vms }}"

    # ------------------------------------------------------------
    # 4. REGISTER VMS IN ESXI
    # ------------------------------------------------------------
    - name: Register VM
      ansible.builtin.shell: |
        sshpass -p "{{ esxi_password }}" ssh {{ esxi_user }}@{{ esxi_host }} "
        vim-cmd solo/registervm {{ base_path }}/{{ item }}/{{ item }}.vmx
        "
      loop: "{{ vms }}"

    # ------------------------------------------------------------
    # 5. POWER ON VMS
    # ------------------------------------------------------------
    - name: Power on VMs
      ansible.builtin.shell: |
        sshpass -p "{{ esxi_password }}" ssh -o StrictHostKeyChecking=no {{ esxi_user }}@{{ esxi_host }} '
          VMID=$(vim-cmd vmsvc/getallvms | grep "{{ item }}" | awk "{print \$1}" | head -n 1)
          if [ -n "$VMID" ]; then
            vim-cmd vmsvc/power.on "$VMID"
          else
            echo "VM not found: {{ item }}"
          fi
        '
      loop: "{{ vms }}"

    - name: Wait for VMs to boot
      ansible.builtin.pause:
        seconds: 60

    # ------------------------------------------------------------
    # 6. GET IP ADDRESSES
    # ------------------------------------------------------------
    - name: Get VM IPs from ESXi
      ansible.builtin.shell: |
        sshpass -p "{{ esxi_password }}" ssh {{ esxi_user }}@{{ esxi_host }} "
          VMID=\$(vim-cmd vmsvc/getallvms | grep '{{ item }}' | awk '{print \$1}' | head -n 1)
          vim-cmd vmsvc/get.guest \$VMID \
          | grep -oE '([0-9]+\.[0-9]+\.[0-9]+\.[0-9]+)' \
          | grep -v '255\|0\.0\.0\.0' \
          | head -n 1
        "
      loop: "{{ vms }}"
      register: vm_ips

    # ------------------------------------------------------------
    # 7. Build IP map 
    # ------------------------------------------------------------
    - name: Build vm_ips dictionary
      ansible.builtin.set_fact:
        vm_ip_map: >-
          {{
            vm_ip_map | default({}) |
            combine({
              item.item: (
                item.stdout
                | regex_search('([0-9]+\\.[0-9]+\\.[0-9]+\\.[0-9]+)')
              )
            })
          }}
      loop: "{{ vm_ips.results }}"
      
    # ------------------------------------------------------------
    # 9. WAIT FOR SSH
    # ------------------------------------------------------------
    - name: Wait for SSH
      ansible.builtin.wait_for:
        host: "{{ vm_ip_map[item] }}"
        port: 22
        timeout: 600
      loop: "{{ vms }}"

    - debug:
        msg: "VM={{ item }} IP={{ vm_ip_map[item] }}"
      loop: "{{ vms }}"

    # ------------------------------------------------------------
    # 10. SET HOSTNAME
    # ------------------------------------------------------------
    - name: Set hostname inside guest
      ansible.builtin.shell: >
        ssh -o StrictHostKeyChecking=no admin@{{ vm_ip_map[item] }}
        "sudo hostnamectl set-hostname {{ item }}"
      loop: "{{ vms }}"
