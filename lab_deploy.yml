---
- name: ESXi VM cloning with full clean rename (Option 2)
  hosts: localhost
  connection: local
  gather_facts: no

  vars:
    esxi_host: 192.168.1.20
    esxi_user: root
    esxi_password: "{{ vmware_password }}"

    base_path: "/vmfs/volumes/datastore1"
    base_vm: "RHEL9-CIS_L1"

    vms:
      - graffias.openincite.net
      - acrab.openincite.net
      - jabbah.openincite.net
      - alniyat.openincite.net
      - apollyon.openincite.net
      - shaula.openincite.net
      - lesath.openincite.net

  tasks:

    # ------------------------------------------------------------
    # 1. CLONE BASE VM FOLDER
    # ------------------------------------------------------------
    - name: Clone base VM directory
      ansible.builtin.shell: |
        sshpass -p "{{ esxi_password }}" ssh -o StrictHostKeyChecking=no {{ esxi_user }}@{{ esxi_host }} \
        "cp -r {{ base_path }}/{{ base_vm }} {{ base_path }}/{{ item }}"
      loop: "{{ vms }}"

    # ------------------------------------------------------------
    # 2. RENAME ALL VM FILES INSIDE EACH FOLDER
    # ------------------------------------------------------------
    - name: Rename VM files to match hostname
      ansible.builtin.shell: |
        sshpass -p "{{ esxi_password }}" ssh {{ esxi_user }}@{{ esxi_host }} "
        cd {{ base_path }}/{{ item }} &&

        mv {{ base_vm }}.vmx {{ item }}.vmx &&
        mv {{ base_vm }}.vmdk {{ item }}.vmdk &&
        mv {{ base_vm }}-flat.vmdk {{ item }}-flat.vmdk &&
        mv {{ base_vm }}.nvram {{ item }}.nvram || true
        "
      loop: "{{ vms }}"

    # ------------------------------------------------------------
    # 3. FIX VMX INTERNAL DISK REFERENCES
    # ------------------------------------------------------------
    - name: Update VMX disk references
      ansible.builtin.shell: |
        sshpass -p "{{ esxi_password }}" ssh {{ esxi_user }}@{{ esxi_host }} "
        sed -i 's/{{ base_vm }}/{{ item }}/g' {{ base_path }}/{{ item }}/{{ item }}.vmx
        "
      loop: "{{ vms }}"

    # ------------------------------------------------------------
    # 4. ENSURE VMX IS VALID (basic check)
    # ------------------------------------------------------------
    - name: Validate VMX exists
      ansible.builtin.shell: |
        sshpass -p "{{ esxi_password }}" ssh {{ esxi_user }}@{{ esxi_host }} \
        "test -f {{ base_path }}/{{ item }}/{{ item }}.vmx && echo OK"
      register: vmx_check
      loop: "{{ vms }}"

    # ------------------------------------------------------------
    # 5. REGISTER VM WITH ESXI
    # ------------------------------------------------------------
    - name: Register VM from VMX
      ansible.builtin.shell: |
        sshpass -p "{{ esxi_password }}" ssh {{ esxi_user }}@{{ esxi_host }} "
        vim-cmd solo/registervm {{ base_path }}/{{ item }}/{{ item }}.vmx
        "
      loop: "{{ vms }}"
