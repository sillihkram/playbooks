---
- name: Deploy and configure RHEL9 CIS VMs on ESXi
  hosts: esxi
  gather_facts: no

  vars:
    vms:
      - graffias.openincite.net
      - acrab.openincite.net
      - jabbah.openincite.net
      - alniyat.openincite.net
      - apollyon.openincite.net
      - shaula.openincite.net
      - lesath.openincite.net

    datastore: datastore1
    network_name: "VM Network"

    source_vmdk_dir: "RHEL9-CIS_L1"
    source_vmdk_name: "RHEL9-CIS_L1.vmdk"

    vm_cpu: 4
    vm_ram_mb: 8192
    vm_disk_gb: 100

    vm_folder: ""

  tasks:

    - name: Create VM directory on datastore
      community.vmware.vsphere_file:
        hostname: "{{ ansible_host }}"
        username: "{{ ansible_user }}"
        password: "{{ ansible_password }}"
        validate_certs: false
        datacenter: ha-datacenter
        datastore: "{{ datastore }}"
        path: "{{ item }}"
        state: directory
      loop: "{{ vms }}"

    - name: Copy base VMDK for each VM (full clone)
      community.vmware.vsphere_copy:
        hostname: "{{ ansible_host }}"
        username: "{{ ansible_user }}"
        password: "{{ ansible_password }}"
        validate_certs: false

        src: "[{{ datastore }}] {{ source_vmdk_dir }}/{{ source_vmdk_name }}"
        dest: "[{{ datastore }}] {{ item }}/{{ item }}.vmdk"
      loop: "{{ vms }}"

    - name: Create VM and attach disk
      community.vmware.vmware_guest:
        hostname: "{{ ansible_host }}"
        username: "{{ ansible_user }}"
        password: "{{ ansible_password }}"
        validate_certs: false

        name: "{{ item }}"
        state: poweredoff
        guest_id: rhel9_64Guest

        hardware:
          memory_mb: "{{ vm_ram_mb }}"
          num_cpus: "{{ vm_cpu }}"
          scsi: paravirtual

        disk:
          - filename: "[{{ datastore }}] {{ item }}/{{ item }}.vmdk"

        networks:
          - name: "{{ network_name }}"
            device_type: vmxnet3

      loop: "{{ vms }}"

    - name: Ensure disk is expanded to 100 GiB
      community.vmware.vmware_guest_disk:
        hostname: "{{ ansible_host }}"
        username: "{{ ansible_user }}"
        password: "{{ ansible_password }}"
        validate_certs: false

        name: "{{ item }}"
        disk:
          - unit_number: 0
            size_gb: "{{ vm_disk_gb }}"
            state: present
      loop: "{{ vms }}"

    - name: Power on VMs
      community.vmware.vmware_guest_powerstate:
        hostname: "{{ ansible_host }}"
        username: "{{ ansible_user }}"
        password: "{{ ansible_password }}"
        validate_certs: false

        name: "{{ item }}"
        state: powered-on
      loop: "{{ vms }}"
