---
- name: Deploy RHEL9 CIS VMs on standalone ESXi using vmkfstools
  hosts: localhost
  connection: local
  gather_facts: no

  vars:
    esxi_host: 192.168.1.20
    esxi_user: root
    esxi_password: "{{ vmware_password }}"

    datastore: "datastore1"
    base_path: "/vmfs/volumes/datastore1"
    base_vm: "RHEL9-CIS_L1"

    vms:
      - graffias.openincite.net
      - acrab.openincite.net
      - jabbah.openincite.net
      - alniyat.openincite.net
      - apollyon.openincite.net
      - shaula.openincite.net
      - lesath.openincite.net

  tasks:

    # ------------------------------------------------------------
    # 1. CREATE VM FOLDERS
    # ------------------------------------------------------------
    - name: Create VM directories
      ansible.builtin.shell: |
        sshpass -p "{{ esxi_password }}" ssh -o StrictHostKeyChecking=no {{ esxi_user }}@{{ esxi_host }} \
        "mkdir -p {{ base_path }}/{{ item }}"
      loop: "{{ vms }}"

    # ------------------------------------------------------------
    # 2. CLONE DISK USING VMKFSTOOLS (THIN PROVISIONED)
    # ------------------------------------------------------------
    - name: Clone base disk (thin provisioned)
      ansible.builtin.shell: |
        sshpass -p "{{ esxi_password }}" ssh {{ esxi_user }}@{{ esxi_host }} "
        vmkfstools -i \
        {{ base_path }}/{{ base_vm }}/{{ base_vm }}.vmdk \
        {{ base_path }}/{{ item }}/{{ item }}.vmdk \
        -d thin
        "
      loop: "{{ vms }}"

    # ------------------------------------------------------------
    # 3. CREATE VMX FILES
    # ------------------------------------------------------------
    - name: Create VMX configuration
      ansible.builtin.shell: |
        sshpass -p "{{ esxi_password }}" ssh {{ esxi_user }}@{{ esxi_host }} "
        cat > {{ base_path }}/{{ item }}/{{ item }}.vmx <<EOF
        config.version = \"8\"
        virtualHW.version = \"19\"
        displayName = \"{{ item }}\"
        guestOS = \"rhel9_64Guest\"

        memsize = \"8192\"
        numvcpus = \"4\"

        scsi0.present = \"TRUE\"
        scsi0.virtualDev = \"lsilogic\"

        scsi0:0.present = \"TRUE\"
        scsi0:0.fileName = \"{{ item }}.vmdk\"

        ethernet0.present = \"TRUE\"
        ethernet0.networkName = \"VM Network\"
        ethernet0.addressType = \"generated\"

        EOF
        "
      loop: "{{ vms }}"

    # ------------------------------------------------------------
    # 4. REGISTER VMS IN ESXI
    # ------------------------------------------------------------
    - name: Register VM
      ansible.builtin.shell: |
        sshpass -p "{{ esxi_password }}" ssh {{ esxi_user }}@{{ esxi_host }} "
        vim-cmd solo/registervm {{ base_path }}/{{ item }}/{{ item }}.vmx
        "
      loop: "{{ vms }}"

    # ------------------------------------------------------------
    # 5. POWER ON VMS
    # ------------------------------------------------------------
    # ------------------------------------------------------------
    # 5. POWER ON VMS (FIXED CLEAN)
    # ------------------------------------------------------------
    - name: Power on VMs
      ansible.builtin.shell: |
        sshpass -p "{{ esxi_password }}" ssh -o StrictHostKeyChecking=no {{ esxi_user }}@{{ esxi_host }} '
          VMID=$(vim-cmd vmsvc/getallvms | grep "{{ item }}" | awk "{print \$1}" | head -n 1)
          if [ -n "$VMID" ]; then
            vim-cmd vmsvc/power.on "$VMID"
          else
            echo "VM not found: {{ item }}"
          fi
        '
        loop: "{{ vms }}"

    # ------------------------------------------------------------
    # 6. WAIT FOR SSH (POST BOOT)
    # ------------------------------------------------------------
    - name: Wait for SSH
      ansible.builtin.wait_for:
        host: "{{ item }}"
        port: 22
        timeout: 900
      loop: "{{ vms }}"
