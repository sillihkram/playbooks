- name: Clone VMs from golden VM (ESXi standalone safe)
  hosts: localhost
  connection: local
  gather_facts: no

  vars:
    vms:
      - graffias.openincite.net
      - acrab.openincite.net
      - jabbah.openincite.net
      - alniyat.openincite.net
      - apollyon.openincite.net
      - shaula.openincite.net
      - lesath.openincite.net

    vmware_hostname: 192.168.1.20
    vmware_username: root
    vmware_password: "{{ vmware_password }}"

    datacenter: ha-datacenter
    folder: "/ha-datacenter/vm"

    datastore: datastore1
    network_name: "VM Network"

    vm_cpu: 4
    vm_ram_mb: 8192

    source_vm: "RHEL9-CIS_L1"

  tasks:

    - name: Clone VM from golden VM
      community.vmware.vmware_guest:
        hostname: "{{ vmware_hostname }}"
        username: "{{ vmware_username }}"
        password: "{{ vmware_password }}"
        validate_certs: false
        port: 443

        datacenter: "{{ datacenter }}"
        folder: "{{ folder }}"
        datastore: "{{ datastore }}"

        name: "{{ item }}"
        state: poweredoff

        is_template: false
        template: "{{ source_vm }}"

        hardware:
          memory_mb: "{{ vm_ram_mb }}"
          num_cpus: "{{ vm_cpu }}"

        networks:
          - name: "{{ network_name }}"
            device_type: vmxnet3

      loop: "{{ vms }}"
      delegate_to: localhost
