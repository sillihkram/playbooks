---
- name: Deploy RHEL9 CIS VMs on standalone ESXi
  hosts: localhost
  connection: local
  gather_facts: no

  vars:
    vmware_hostname: 192.168.1.20
    vmware_username: root
    vmware_password: "{{ vmware_password }}"

    datacenter: ha-datacenter
    datastore: datastore1

    network_name: "VM Network"

    vms:
      - graffias.openincite.net
      - acrab.openincite.net
      - jabbah.openincite.net
      - alniyat.openincite.net
      - apollyon.openincite.net
      - shaula.openincite.net
      - lesath.openincite.net

    base_path: "RHEL9-CIS_L1"
    base_disk: "RHEL9-CIS_L1.vmdk"

  tasks:

    # ------------------------------------------------------------
    # COPY BASE DISK FOR EACH VM (IN DATASTORE ONLY)
    # ------------------------------------------------------------
    - name: Copy base VMDK for each VM
      community.vmware.vsphere_copy:
        hostname: "{{ vmware_hostname }}"
        username: "{{ vmware_username }}"
        password: "{{ vmware_password }}"
        validate_certs: false

        datacenter: "{{ datacenter }}"
        datastore: "{{ datastore }}"

        src: "{{ base_path }}/{{ base_disk }}"
        dest: "{{ item }}/{{ item }}.vmdk"

      loop: "{{ vms }}"
      delegate_to: localhost

    # ------------------------------------------------------------
    # CREATE VM SHELLS
    # ------------------------------------------------------------
    - name: Create VM and attach copied disk
      community.vmware.vmware_guest:
        hostname: "{{ vmware_hostname }}"
        username: "{{ vmware_username }}"
        password: "{{ vmware_password }}"
        validate_certs: false
        port: 443

        datacenter: "{{ datacenter }}"
        folder: "/ha-datacenter/vm"
        datastore: "{{ datastore }}"

        name: "{{ item }}"
        state: poweredoff
        guest_id: rhel9_64Guest

        hardware:
          memory_mb: 8192
          num_cpus: 4
          scsi: paravirtual

        disk:
          - filename: "[{{ datastore }}] {{ item }}/{{ item }}.vmdk"

        networks:
          - name: "{{ network_name }}"
            device_type: vmxnet3

      loop: "{{ vms }}"
      delegate_to: localhost

    # ------------------------------------------------------------
    # POWER ON VMS
    # ------------------------------------------------------------
    - name: Power on VMs
      community.vmware.vmware_guest_powerstate:
        hostname: "{{ vmware_hostname }}"
        username: "{{ vmware_username }}"
        password: "{{ vmware_password }}"
        validate_certs: false
        port: 443

        name: "{{ item }}"
        state: powered-on

      loop: "{{ vms }}"
      delegate_to: localhost
