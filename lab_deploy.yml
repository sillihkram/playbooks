---
- name: Deploy RHEL9 CIS VMs from template on ESXi
  hosts: localhost
  connection: local
  gather_facts: no

  vars:
    vms:
      - graffias.openincite.net
      - acrab.openincite.net
      - jabbah.openincite.net
      - alniyat.openincite.net
      - apollyon.openincite.net
      - shaula.openincite.net
      - lesath.openincite.net

    vmware_hostname: 192.168.1.20
    vmware_username: root
    vmware_password: "{{ vmware_password }}"

    datacenter: ha-datacenter
    folder: "/ha-datacenter/vm"
    datastore: datastore1
    network_name: "VM Network"

    template_name: "RHEL9-CIS_L1-template"

    vm_cpu: 4
    vm_ram_mb: 8192
    vm_disk_gb: 100

  tasks:

    - name: Debug VMware connection
      debug:
        msg:
          - "ESXi: {{ vmware_hostname }}"
          - "User: {{ vmware_username }}"
          - "Template: {{ template_name }}"

    # ------------------------------------------------------------
    # CLONE VMs FROM TEMPLATE
    # ------------------------------------------------------------
    - name: Clone VM from template
      community.vmware.vmware_guest:
        hostname: "{{ vmware_hostname }}"
        username: "{{ vmware_username }}"
        password: "{{ vmware_password }}"
        validate_certs: false
        port: 443

        datacenter: "{{ datacenter }}"
        folder: "{{ folder }}"
        datastore: "{{ datastore }}"

        name: "{{ item }}"
        template: "{{ template_name }}"
        state: poweredoff

        hardware:
          memory_mb: "{{ vm_ram_mb }}"
          num_cpus: "{{ vm_cpu }}"

        disk:
          - size_gb: "{{ vm_disk_gb }}"
            type: thin

        networks:
          - name: "{{ network_name }}"
            device_type: vmxnet3

      loop: "{{ vms }}"
      delegate_to: localhost

    # ------------------------------------------------------------
    # POWER ON VMs
    # ------------------------------------------------------------
    - name: Power on VMs
      community.vmware.vmware_guest_powerstate:
        hostname: "{{ vmware_hostname }}"
        username: "{{ vmware_username }}"
        password: "{{ vmware_password }}"
        validate_certs: false
        port: 443

        name: "{{ item }}"
        state: powered-on

      loop: "{{ vms }}"
      delegate_to: localhost
