---
- name: ESXi provisioning + RHEL post configuration
  hosts: localhost
  connection: local
  gather_facts: no

  vars:
    esxi_host: 192.168.1.20
    esxi_user: root
    esxi_password: "{{ vmware_password }}"

    base_path: "/vmfs/volumes/datastore1"
    base_vm: "RHEL9-CIS_L1"

    vms:
      - graffias.openincite.net
      - acrab.openincite.net
      - jabbah.openincite.net
      - alniyat.openincite.net
      - apollyon.openincite.net
      - shaula.openincite.net
      - lesath.openincite.net

  tasks:

    # ------------------------------------------------------------
    # 1. CLONE VMS ON ESXI
    # ------------------------------------------------------------
    - name: Clone VM directory on ESXi
      ansible.builtin.shell: |
        sshpass -p "{{ esxi_password }}" ssh -o StrictHostKeyChecking=no {{ esxi_user }}@{{ esxi_host }} \
        "cp -r {{ base_path }}/{{ base_vm }} {{ base_path }}/{{ item }}"
      loop: "{{ vms }}"

    # ------------------------------------------------------------
    # 2. RENAME VM FILES
    # ------------------------------------------------------------
    - name: Rename VM files
      ansible.builtin.shell: |
        sshpass -p "{{ esxi_password }}" ssh -o StrictHostKeyChecking=no {{ esxi_user }}@{{ esxi_host }} "
        cd {{ base_path }}/{{ item }} &&
        mv {{ base_vm }}.vmx {{ item }}.vmx || true &&
        mv {{ base_vm }}.nvram {{ item }}.nvram || true &&
        mv {{ base_vm }}.vmdk {{ item }}.vmdk || true &&
        mv {{ base_vm }}-flat.vmdk {{ item }}-flat.vmdk || true
        "
      loop: "{{ vms }}"

    # ------------------------------------------------------------
    # 3. REGISTER VMS
    # ------------------------------------------------------------
    - name: Register VM in ESXi
      ansible.builtin.shell: |
        sshpass -p "{{ esxi_password }}" ssh -o StrictHostKeyChecking=no {{ esxi_user }}@{{ esxi_host }} \
        "vim-cmd solo/registervm {{ base_path }}/{{ item }}/{{ item }}.vmx"
      loop: "{{ vms }}"

    # ------------------------------------------------------------
    # 4. POWER ON VMS
    # ------------------------------------------------------------
    - name: Power on VMs
      ansible.builtin.shell: |
        sshpass -p "{{ esxi_password }}" ssh -o StrictHostKeyChecking=no {{ esxi_user }}@{{ esxi_host }} \
        "vim-cmd vmsvc/getallvms | grep {{ item }} | awk '{print \$1}' | xargs -I{} vim-cmd vmsvc/power.on {}"
      loop: "{{ vms }}"

    # ------------------------------------------------------------
    # 5. WAIT FOR SSH ON GUESTS
    # ------------------------------------------------------------
    - name: Wait for SSH on VMs
      ansible.builtin.wait_for:
        host: "{{ item }}"
        port: 22
        timeout: 900
      loop: "{{ vms }}"

    # ------------------------------------------------------------
    # 6. POST-CONFIGURATION (INSIDE GUESTS)
    # ------------------------------------------------------------
    - name: Normalize hostname + identity on VMs
      ansible.builtin.shell: |
        sshpass -p "{{ vm_password }}" ssh -o StrictHostKeyChecking=no root@{{ item }} "
        hostnamectl set-hostname {{ item }} &&
        rm -f /etc/machine-id &&
        systemd-machine-id-setup &&
        rm -f /etc/ssh/ssh_host_* &&
        ssh-keygen -A
        "
      loop: "{{ vms }}"
