---
- name: Apply Live Kernel Patches with kpatch
  hosts: all
  become: true
  tasks:
    - name: Ensure kpatch utility is installed
      ansible.builtin.dnf:
        name: kpatch
        state: present

    - name: Apply kpatch for the exact running kernel version
      # Using shell here ensures DNF uses the same $(uname -r) logic as your CLI
      ansible.builtin.shell: dnf install -y "kpatch-patch = $(uname -r)"
      register: kpatch_install
      changed_when: "'Nothing to do' not in kpatch_install.stdout"
      failed_when: 
        - kpatch_install.rc != 0
        # Ignore errors if no patch is available for this specific kernel yet
        - "'No match for argument' not in kpatch_install.stderr"

    - name: Verify loaded kpatch modules
      ansible.builtin.command: kpatch list
      register: kpatch_list
      changed_when: false

    - name: Display current patch status
      ansible.builtin.debug:
        msg: "{{ kpatch_list.stdout_lines }}"
